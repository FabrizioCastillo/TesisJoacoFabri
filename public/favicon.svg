<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#050505" />
  <g fill="none" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <!-- Una forma minimalista de D e I entrelazadas o capas profundas "Deep" -->
    <!-- Caja exterior brillante -->
    <polygon points="50,15 85,35 85,65 50,85 15,65 15,35" stroke="#333" />
    <!-- Caja interior -->
    <polygon points="50,30 70,42 70,58 50,70 30,58 30,42" stroke="#fff" fill="#fff" fill-opacity="0.1" />
    <!-- Línea central que marca la Interface -->
    <line x1="50" y1="15" x2="50" y2="85" stroke="#aaa" stroke-width="3" />
  </g>
</svg>